services:
  - type: web
    name: bsuk-api
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.gateway.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEPLOYMENT_MODE
        value: monolith
      - key: GAS_SCRIPT_URL
        sync: false
      - key: API_KEYS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health
    autoDeploy: true
